<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cars — DerbySystem</title>
  <link rel="stylesheet" href="/frontend/styles.css" />
  <script src="/frontend/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/frontend/lib/router.js"></script>
  <script src="/frontend/lib/api.js"></script>
  <script src="/frontend/lib/admin.js"></script>
</head>
<body>

<div id="pinGate" style="position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;">
  <div style="text-align:center;max-width:300px;padding:20px;">
    <h2 style="margin-bottom:8px;">Admin Access</h2>
    <p style="margin-bottom:16px;">Enter the 4-digit PIN</p>
    <input type="tel" id="pinInput" maxlength="4" placeholder="••••" autocomplete="off"
           style="text-align:center;font-size:2rem;letter-spacing:12px;width:160px;margin:0 auto 16px;display:block;" />
    <p id="pinErr" style="color:var(--danger);font-size:0.82rem;min-height:1.4em;"></p>
  </div>
</div>

<nav class="top-nav">
  <span class="brand" id="navBrand">Derby</span>
  <span id="navLinks"></span>
</nav>

<div class="container" style="padding-top:20px;">
  <div class="card">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:10px;">
      <div class="card-title" style="margin:0;">All Cars (<span id="carCount">0</span>)</div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-primary btn-sm" onclick="openAddCar()">+ Add Car</button>
        <button class="btn btn-ghost btn-sm" onclick="loadCars()">↻ Refresh</button>
      </div>
    </div>
    <div id="carList"><span class="spinner"></span></div>
  </div>
</div>

<!-- Add Car modal -->
<div class="confirm-overlay" id="addOverlay">
  <div class="confirm-box" style="max-width:400px; width:100%; text-align:left;">
    <div id="addForm">
      <h3 style="margin-bottom:18px;">Add Car</h3>
      <label>Racer Name</label>
      <input type="text" id="addName" autocapitalize="words" placeholder="e.g. Jamie Smith" />
      <p id="addErr" style="color:var(--danger); font-size:0.82rem; min-height:1.2em; margin-bottom:8px;"></p>
      <div class="confirm-btns" style="margin-top:4px;">
        <button class="btn btn-ghost btn-full" onclick="closeAddCar()">Cancel</button>
        <button class="btn btn-primary btn-full" id="addSaveBtn" onclick="submitAddCar()">Add Car</button>
      </div>
    </div>
  </div>
</div>

<!-- Edit Car modal -->
<div class="confirm-overlay" id="editOverlay">
  <div class="confirm-box" style="max-width:400px; width:100%; text-align:left;">
    <h3 style="margin-bottom:18px;">Edit Car</h3>
    <label>Racer Name</label>
    <input type="text" id="editName" autocapitalize="words" />
    <label style="margin-top:8px;">Legal Status</label>
    <select id="editStatus" style="margin-bottom:14px;">
      <option value="pending">Pending</option>
      <option value="legal">Legal</option>
      <option value="not_legal">Not Legal</option>
    </select>
    <p id="editErr" style="color:var(--danger); font-size:0.82rem; min-height:1.2em; margin-bottom:8px;"></p>
    <div class="confirm-btns" style="margin-top:4px;">
      <button class="btn btn-ghost btn-full"  onclick="closeEditCar()">Cancel</button>
      <button class="btn btn-primary btn-full" id="editSaveBtn" onclick="submitEditCar()">Save</button>
    </div>
  </div>
</div>

<!-- Delete confirm -->
<div class="confirm-overlay" id="delOverlay">
  <div class="confirm-box" style="max-width:360px; width:100%;">
    <h3>Delete Car?</h3>
    <p id="delCarName" style="margin:12px 0 20px;"></p>
    <div class="confirm-btns">
      <button class="btn btn-ghost btn-full" onclick="closeDel()">Cancel</button>
      <button class="btn btn-danger btn-full" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let ctx, event, eventId;
  let editCarId  = null;
  let deleteCarId = null;

  (async () => {
    ({ ctx, event, eventId } = await adminBoot());
    document.title = `Cars — ${event.name}`;
    document.getElementById("navBrand").textContent = "🏁 " + (event.track_name || "Derby");
    document.getElementById("navLinks").innerHTML   = buildAdminNav(ctx, "cars");
    await loadCars();
    subscribeTable(eventId, "cars", loadCars);
  })();

  async function loadCars() {
    const { data: cars, error } = await sb
      .from("cars")
      .select("*")
      .eq("event_id", eventId)
      .order("car_number");

    const el = document.getElementById("carList");
    document.getElementById("carCount").textContent = cars?.length ?? 0;

    if (error) { el.innerHTML = `<p style="color:var(--danger)">${error.message}</p>`; return; }
    if (!cars?.length) { el.innerHTML = `<div class="empty-state">No cars yet</div>`; return; }

    const statusColor = { legal: "var(--success)", not_legal: "var(--danger)", pending: "var(--muted2)" };
    const statusLabel = { legal: "Legal ✓", not_legal: "Not Legal ✗", pending: "Pending" };

    el.innerHTML = cars.map(c => {
      const img = `<div style="width:56px; height:56px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:1.5rem; flex-shrink:0;">🚗</div>`;
      return `
        <div style="display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border);">
          ${img}
          <div style="flex:1; min-width:0;">
            <div style="font-size:1.3rem; font-weight:900; color:var(--accent); line-height:1;">#${c.car_number}</div>
            <div style="font-weight:600; font-size:0.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.kid_name}</div>
            <div style="font-size:0.78rem; color:${statusColor[c.legal_status] || "var(--muted2)"}; font-weight:700; margin-top:2px;">${statusLabel[c.legal_status] || c.legal_status}</div>
          </div>
          <div style="display:flex; flex-direction:column; gap:6px;">
            <button class="btn btn-ghost btn-sm" onclick="openEditCar('${c.id}')">Edit</button>
            <button class="btn btn-ghost-danger btn-sm" onclick="openDel('${c.id}', '${c.kid_name.replace(/'/g,"\\'")}')">Del</button>
          </div>
        </div>`;
    }).join("");
  }

  // ── Add car ──────────────────────────────────────────────────
  function openAddCar() {
    document.getElementById("addName").value = "";
    document.getElementById("addErr").textContent = "";
    document.getElementById("addOverlay").classList.add("open");
  }

  function closeAddCar() {
    document.getElementById("addOverlay").classList.remove("open");
  }

  async function submitAddCar() {
    const name  = document.getElementById("addName").value.trim();
    const errEl = document.getElementById("addErr");
    if (!name) { errEl.textContent = "Enter a racer name"; return; }

    const btn = document.getElementById("addSaveBtn");
    btn.disabled = true; btn.textContent = "Saving…";
    errEl.textContent = "";

    const { error } = await sb.from("cars").insert({ event_id: eventId, kid_name: name });
    btn.disabled = false; btn.textContent = "Add Car";

    if (error) { errEl.textContent = error.message; return; }
    closeAddCar();
    toast("Car added!");
    await loadCars();
  }

  // ── Edit car ─────────────────────────────────────────────────
  async function openEditCar(id) {
    editCarId = id;
    const { data: car } = await sb.from("cars").select("*").eq("id", id).single();
    if (!car) return;
    document.getElementById("editName").value   = car.kid_name;
    document.getElementById("editStatus").value = car.legal_status;
    document.getElementById("editErr").textContent = "";
    document.getElementById("editOverlay").classList.add("open");
  }

  function closeEditCar() {
    document.getElementById("editOverlay").classList.remove("open");
    editCarId = null;
  }

  async function submitEditCar() {
    if (!editCarId) return;
    const name   = document.getElementById("editName").value.trim();
    const status = document.getElementById("editStatus").value;
    const errEl  = document.getElementById("editErr");
    if (!name) { errEl.textContent = "Enter a racer name"; return; }

    const btn = document.getElementById("editSaveBtn");
    btn.disabled = true; btn.textContent = "Saving…";

    const { error } = await sb.from("cars").update({ kid_name: name, legal_status: status }).eq("id", editCarId);
    btn.disabled = false; btn.textContent = "Save";

    if (error) { errEl.textContent = error.message; return; }
    closeEditCar();
    toast("Car updated!");
    await loadCars();
  }

  // ── Delete car ───────────────────────────────────────────────
  function openDel(id, name) {
    deleteCarId = id;
    document.getElementById("delCarName").textContent = `Delete "${name}"? This cannot be undone.`;
    document.getElementById("delOverlay").classList.add("open");
  }

  function closeDel() {
    deleteCarId = null;
    document.getElementById("delOverlay").classList.remove("open");
  }

  async function confirmDelete() {
    if (!deleteCarId) return;
    const { error } = await sb.from("cars").delete().eq("id", deleteCarId);
    closeDel();
    if (error) { toast(error.message, false); return; }
    toast("Car deleted");
    await loadCars();
  }
</script>

</body>
</html>
